[ollama]
# model = "qwen3:8b"
# model = "llama3.2"
model = "qwen2.5:7b"
base_url = "http://localhost:11434/"
temperature = 0.1
num_ctx = 8192
max_tokens = 2000

[claude]
model = "claude-sonnet-4-5"
temperature = 0.1
max_tokens = 2000

[run]
backend = "ollama"

[vault]
path = "./data"
ground_truth = "./data/ground_truth.yaml"
prompts_dir = "./prompts"
