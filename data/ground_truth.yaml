- file: long_interview_climate_scientist_sea_level_en.md
  lang: en
  length: long
  summary: >-
    An interview with Dr. Maria van den Berg, professor of coastal hydrology at TU Delft and senior
    fellow at Deltares, about sea level rise risks to the Netherlands. She warns that current Dutch
    flood defence standards are based on outdated projections and advocates for adaptive pathway
    planning, citing Rotterdam as a world leader in adaptation. She criticises the Schoof cabinet's
    €14 million cut to KNMI's budget as a false economy that undermines the science needed to design
    flood defences.
  tags:
    - climate-science
    - sea-level-rise
