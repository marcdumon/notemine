- file: medium_history_dutch_golden_age_en.md
  lang: en
  length: medium
  summary: >-
    An encyclopaedic overview of the Dutch Golden Age (1588-1702), covering the founding of the VOC
    in Amsterdam in 1602 and its role in global trade from Batavia to New Amsterdam. The article
    covers major artists Rembrandt van Rijn and Johannes Vermeer, scientists Christiaan Huygens and
    Antonie van Leeuwenhoek, and philosopher Baruch Spinoza. The Dutch government's 2022 apology
    for the WIC's role in the transatlantic slave trade is noted.
  tags:
    - dutch-history
