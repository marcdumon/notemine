- file: short_recipe_dutch_stamppot_en.md
  lang: en
  length: short
  summary: >-
    A recipe for classic Dutch stamppot boerenkool met worst, combining mashed potatoes with curly
    kale and smoked sausage (rookworst). The recipe includes ingredients, step-by-step instructions,
    and a seasonal note that stamppot is traditionally eaten from October to March in the Netherlands.
    Brands Unox and Hema are cited as traditional rookworst producers.
