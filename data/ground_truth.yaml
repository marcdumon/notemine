- file: long_opinion_eu_ai_act_digital_policy_en.md
  lang: en
  length: long
  summary: >-
    An opinion piece arguing that while the EU AI Act is a genuine regulatory achievement, its
    implementation is undermined by slow member-state enforcement, lobbying-induced dilution, and
    structural timing lags behind fast-moving AI development. The author compares the Act's likely
    trajectory to the GDPR's slow enforcement and argues that effective AI governance also requires
    European sovereign compute, a transatlantic agreement, civil society funding, and clarity on
    what fundamental rights the regulation is meant to protect.
  tags:
    - eu-ai-act
    - digital-policy
