- file: medium_climate_blog_paris_agreement_en.md
  lang: en
  length: medium
  summary: >-
    Ten years after the Paris Agreement was signed in Le Bourget, France, global CO₂ emissions
    have reached record levels and temperatures are at 1.45°C above pre-industrial baseline.
    While the EU has cut emissions by 32%, major emitters like Brazil (deforestation) and India
    (2070 net zero target) are falling short. The upcoming COP30 summit in Belém, Brazil, is
    cited as a critical test of international resolve.
