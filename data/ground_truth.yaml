- file: long_ai_healthcare_oncology_research_en.md
  lang: en
  length: long
  summary: >-
    A clinical trial at Amsterdam UMC involving 2,847 patients found that AI-assisted pathology
    (PathAI Colorectal Classifier v3.1) improved early-stage colorectal cancer diagnostic accuracy
    from 91.7% to 96.3% and reduced reporting time by 38.7%. The trial, led by Dr. Jan de Vries
    and Prof. Maria Santos, was published in The Lancet Digital Health and received CE marking
    under EU MDR. Philips Healthcare and PathAI announced a commercial partnership to roll out
    the technology to 35 Dutch hospitals by Q1 2026.
  tags:
